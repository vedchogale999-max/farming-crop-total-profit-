<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Farming Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <div class="container">

        <h1>Farming Dashboard</h1>

        <button onclick="addRow()">Add New Crop</button>

        <table id="cropTable">
            <thead>
                <tr>
                    <th>Crop Name</th>
                    <th>Area</th>
                    <th>Production</th>
                    <th>Price</th>
                    <th>Profit</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                <tr>
                    <td contenteditable="true">Rice</td>
                    <td><input type="number" class="area" value="5"></td>
                    <td><input type="number" class="production" value="8000"></td>
                    <td><input type="number" class="price" value="25"></td>
                    <td class="profit"></td>
                </tr>

                <tr>
                    <td contenteditable="true">Wheat</td>
                    <td><input type="number" class="area" value="3"></td>
                    <td><input type="number" class="production" value="5000"></td>
                    <td><input type="number" class="price" value="22"></td>
                    <td class="profit"></td>
                </tr>
            </tbody>
        </table>

        <h3>Total Profit: ₹ <span id="totalProfit">0</span></h3>

        <canvas id="profitChart"></canvas>

    </div>

    <script>
        let chart;

        function calculateProfit() {
            let rows = document.querySelectorAll("#tableBody tr");
            let total = 0;
            let data = [];

            let labels = [];
            let profits = [];

            rows.forEach((row) => {
                let cropName = row.cells[0].innerText;
                let area = row.querySelector(".area").value;
                let production = parseFloat(row.querySelector(".production").value);
                let price = parseFloat(row.querySelector(".price").value);
                let profitCell = row.querySelector(".profit");

                let profit = 0;

                if (isNaN(production) || isNaN(price)) {
                    profitCell.innerText = "Invalid";
                    profitCell.style.color = "red";
                } else {
                    profit = production * price;
                    profitCell.innerText = profit;
                    profitCell.style.color = "black";
                    total += profit;

                    labels.push(cropName);
                    profits.push(profit);
                }

                data.push({
                    crop: cropName,
                    area: area,
                    production: production,
                    price: price
                });
            });

            document.getElementById("totalProfit").innerText = total;

            localStorage.setItem("cropData", JSON.stringify(data));

            updateChart(labels, profits);
        }


        function updateChart(labels, profits) {
            if (chart) chart.destroy();

            let ctx = document.getElementById("profitChart").getContext("2d");

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Profit (₹)",
                        data: profits
                    }]
                }
            });
        }


        function loadData() {
            let savedData = localStorage.getItem("cropData");
            if (!savedData) return;

            let data = JSON.parse(savedData);
            let tableBody = document.getElementById("tableBody");

            tableBody.innerHTML = "";

            data.forEach(item => {
                let row = document.createElement("tr");

                row.innerHTML = `
      <td contenteditable="true">${item.crop}</td>
      <td><input type="number" class="area" value="${item.area}"></td>
      <td><input type="number" class="production" value="${item.production}"></td>
      <td><input type="number" class="price" value="${item.price}"></td>
      <td class="profit"></td>
      <td><button onclick="deleteRow(this)">Delete</button></td>
    `;

                tableBody.appendChild(row);

                row.querySelectorAll(".area, .production, .price").forEach(input => {
                    input.addEventListener("input", calculateProfit);
                });
            });
        }


        function addRow() {
            let tableBody = document.getElementById("tableBody");

            let row = document.createElement("tr");

            row.innerHTML = `
    <td contenteditable="true">New Crop</td>
    <td><input type="number" class="area" value="0"></td>
    <td><input type="number" class="production" value="0"></td>
    <td><input type="number" class="price" value="0"></td>
    <td class="profit"></td>
    <td><button onclick="deleteRow(this)">Delete</button></td>
  `;

            tableBody.appendChild(row);

            row.querySelectorAll(".area, .production, .price").forEach(input => {
                input.addEventListener("input", calculateProfit);
            });

            calculateProfit();
        }


        // Run
        loadData();
        calculateProfit();
    </script>

    <script>
        function deleteRow(btn) {
            let row = btn.parentElement.parentElement;
            row.remove();
            calculateProfit();
        }
    </script>

    <button onclick="resetData()">Reset All Data</button>

    <script>
        function resetData() {
            if (confirm("Are you sure you want to delete all data?")) {
                localStorage.removeItem("cropData");
                location.reload();
            }
        }
    </script>

</body>

</html>
